<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日选股</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-top">
        <h1 class="title">📈 每日选股</h1>
        <span class="market-badge" id="marketBadge">🔥</span>
      </div>
      <div class="header-sub">
        <span id="dateDisplay"></span>
        <span class="market-context" id="marketContext">加载中...</span>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="content">
      <!-- Loading -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span>加载数据中...</span>
      </div>

      <!-- Tab: Today -->
      <section id="tab-today" class="tab-content active">
        <div class="section-header">
          <h2>🎯 今日关注</h2>
          <span class="stock-count" id="todayCount"></span>
        </div>
        <div id="stockList" class="stock-list"></div>
      </section>

      <!-- Tab: Analysis -->
      <section id="tab-analysis" class="tab-content">
        <div class="section-header">
          <h2>🤖 深度分析</h2>
        </div>
        <div id="analysisList" class="analysis-list"></div>
      </section>

      <!-- Tab: History -->
      <section id="tab-history" class="tab-content">
        <div class="section-header">
          <h2>📊 历史回顾</h2>
        </div>
        <div id="historyList" class="history-list"></div>
      </section>
    </main>

    <!-- Stock Detail Modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-overlay" id="modalOverlay"></div>
      <div class="modal-content">
        <button class="modal-close" id="modalClose">✕</button>
        <div id="modalBody"></div>
      </div>
    </div>

    <!-- Bottom Tab Bar -->
    <nav id="tabBar" class="tab-bar">
      <button class="tab-btn active" data-tab="today">
        <span class="tab-icon">🎯</span>
        <span class="tab-label">今日</span>
      </button>
      <button class="tab-btn" data-tab="analysis">
        <span class="tab-icon">🤖</span>
        <span class="tab-label">分析</span>
      </button>
      <button class="tab-btn" data-tab="history">
        <span class="tab-icon">📊</span>
        <span class="tab-label">回顾</span>
      </button>
    </nav>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
